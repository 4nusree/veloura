<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Veloura — Forgot your password? Request a reset link." />
  <title>Forgot Password — Veloura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
</head>
<body class="auth-body">

  <div class="auth-split" data-testid="auth-split">

    <!-- LEFT: Fashion Image -->
    <div class="auth-left" data-testid="auth-left">
      <div class="auth-left-overlay">
        <div class="auth-left-content">
          <div class="auth-brand-mark">VELOURA</div>
          <h1 class="auth-left-title">Recover<br /><em>Access</em></h1>
          <p class="auth-left-sub">We'll send a reset link to your inbox</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: Form -->
    <div class="auth-right" data-testid="auth-right">

      <a href="/login" class="auth-back-link" data-testid="link-auth-back">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to login
      </a>

      <div class="auth-card" data-testid="auth-card">

        <div class="auth-card-head">
          <p class="auth-eyebrow" data-testid="text-auth-eyebrow">Account recovery</p>
          <h2 class="auth-card-title" data-testid="text-auth-title">Forgot Password?</h2>
          <p class="auth-card-sub" data-testid="text-auth-sub">Enter the email linked to your account and we'll send you a reset link.</p>
        </div>

        <div id="auth-message" class="auth-message" style="display:none;" role="alert" data-testid="text-auth-message"></div>

        <form id="forgot-form" class="auth-form" novalidate data-testid="form-forgot">

          <div class="auth-field">
            <label class="auth-label" for="email">Email Address</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
              <input type="email" id="email" name="email" class="auth-input" placeholder="you@example.com" autocomplete="email" data-testid="input-email" required />
            </div>
            <span class="auth-error" id="err-email" data-testid="error-email"></span>
          </div>

          <button type="submit" id="forgot-submit-btn" class="auth-submit-btn" data-testid="button-forgot-submit">
            Send Reset Link
          </button>

        </form>

        <div class="auth-toggle" data-testid="auth-toggle">
          <span>Remember your password?</span>
          <a href="/login" class="auth-toggle-btn" style="text-decoration:none;" data-testid="link-back-to-login">Sign In</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    (function () {
      var form    = document.getElementById('forgot-form');
      var btn     = document.getElementById('forgot-submit-btn');
      var msgBox  = document.getElementById('auth-message');
      var errEmail = document.getElementById('err-email');

      function showMsg(text, type) {
        msgBox.textContent = text;
        msgBox.className   = 'auth-message auth-message--' + type;
        msgBox.style.display = 'block';
      }

      function clearErrors() {
        errEmail.textContent = '';
        document.getElementById('email').classList.remove('input-error');
      }

      var csrfToken = null;
      function getCsrfToken() {
        if (csrfToken) return Promise.resolve(csrfToken);
        return fetch('/api/csrf-token')
          .then(function (res) { return res.json(); })
          .then(function (data) {
            csrfToken = data.csrf_token || '';
            return csrfToken;
          });
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearErrors();

        var email = document.getElementById('email').value.trim();
        if (!email) {
          errEmail.textContent = 'Email is required';
          document.getElementById('email').classList.add('input-error');
          return;
        }

        btn.disabled     = true;
        btn.textContent  = 'Sending…';
        msgBox.style.display = 'none';

        getCsrfToken()
        .then(function (token) {
          return fetch('/api/forgot-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': token },
            body:    JSON.stringify({ email: email })
          });
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.error) {
            showMsg(data.error, 'error');
            btn.disabled    = false;
            btn.textContent = 'Send Reset Link';
          } else {
            showMsg('Check your inbox — a reset link has been sent.', 'success');
            form.style.display = 'none';
          }
        })
        .catch(function () {
          showMsg('Something went wrong. Please try again.', 'error');
          btn.disabled    = false;
          btn.textContent = 'Send Reset Link';
        });
      });
    })();
  </script>
</body>
</html>
