<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Veloura — Set a new password for your account." />
  <title>Reset Password — Veloura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
</head>
<body class="auth-body">

  <div class="auth-split" data-testid="auth-split">

    <!-- LEFT: Fashion Image -->
    <div class="auth-left" data-testid="auth-left">
      <div class="auth-left-overlay">
        <div class="auth-left-content">
          <div class="auth-brand-mark">VELOURA</div>
          <h1 class="auth-left-title">New<br /><em>Password</em></h1>
          <p class="auth-left-sub">Choose a strong password to protect your account</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: Form -->
    <div class="auth-right" data-testid="auth-right">

      <a href="/login" class="auth-back-link" data-testid="link-auth-back">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to login
      </a>

      <div class="auth-card" data-testid="auth-card">

        <div class="auth-card-head">
          <p class="auth-eyebrow" data-testid="text-auth-eyebrow">Account recovery</p>
          <h2 class="auth-card-title" data-testid="text-auth-title">Set New Password</h2>
          <p class="auth-card-sub" data-testid="text-auth-sub">Enter and confirm your new password below.</p>
        </div>

        <div id="auth-message" class="auth-message" style="display:none;" role="alert" data-testid="text-auth-message"></div>

        <form id="reset-form" class="auth-form" novalidate data-testid="form-reset">

          <!-- New Password -->
          <div class="auth-field">
            <label class="auth-label" for="new-password">New Password</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="new-password" name="new-password" class="auth-input" placeholder="Minimum 6 characters" autocomplete="new-password" data-testid="input-new-password" required />
              <button type="button" class="auth-eye-btn" id="toggle-new-pass" aria-label="Toggle password visibility" data-testid="button-toggle-new-password">
                <svg id="eye-new" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="auth-error" id="err-new-password" data-testid="error-new-password"></span>
          </div>

          <!-- Confirm Password -->
          <div class="auth-field">
            <label class="auth-label" for="confirm-password">Confirm Password</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="confirm-password" name="confirm-password" class="auth-input" placeholder="Re-enter your password" autocomplete="new-password" data-testid="input-confirm-password" required />
              <button type="button" class="auth-eye-btn" id="toggle-confirm-pass" aria-label="Toggle confirm password visibility" data-testid="button-toggle-confirm-password">
                <svg id="eye-confirm" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="auth-error" id="err-confirm-password" data-testid="error-confirm-password"></span>
          </div>

          <button type="submit" id="reset-submit-btn" class="auth-submit-btn" data-testid="button-reset-submit">
            Reset Password
          </button>

        </form>

        <div id="login-redirect" style="display:none;" class="auth-toggle" data-testid="auth-toggle">
          <span>Password updated!</span>
          <a href="/login" class="auth-toggle-btn" style="text-decoration:none;" data-testid="link-go-to-login">Go to Login</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    (function () {
      var form          = document.getElementById('reset-form');
      var btn           = document.getElementById('reset-submit-btn');
      var msgBox        = document.getElementById('auth-message');
      var errNew        = document.getElementById('err-new-password');
      var errConfirm    = document.getElementById('err-confirm-password');
      var loginRedirect = document.getElementById('login-redirect');

      var token = new URLSearchParams(window.location.search).get('token');
      if (!token) {
        showMsg('Invalid or missing reset token. Please request a new link.', 'error');
        form.style.display = 'none';
      }

      function showMsg(text, type) {
        msgBox.textContent   = text;
        msgBox.className     = 'auth-message auth-message--' + type;
        msgBox.style.display = 'block';
      }

      function clearErrors() {
        errNew.textContent     = '';
        errConfirm.textContent = '';
        document.getElementById('new-password').classList.remove('input-error');
        document.getElementById('confirm-password').classList.remove('input-error');
      }

      function toggleVisibility(inputId, eyeId) {
        var inp = document.getElementById(inputId);
        inp.type = inp.type === 'password' ? 'text' : 'password';
      }

      document.getElementById('toggle-new-pass').addEventListener('click', function () {
        toggleVisibility('new-password', 'eye-new');
      });
      document.getElementById('toggle-confirm-pass').addEventListener('click', function () {
        toggleVisibility('confirm-password', 'eye-confirm');
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearErrors();

        var newPw  = document.getElementById('new-password').value;
        var confPw = document.getElementById('confirm-password').value;
        var valid  = true;

        if (!newPw || newPw.length < 6) {
          errNew.textContent = 'Password must be at least 6 characters';
          document.getElementById('new-password').classList.add('input-error');
          valid = false;
        }
        if (!confPw) {
          errConfirm.textContent = 'Please confirm your password';
          document.getElementById('confirm-password').classList.add('input-error');
          valid = false;
        } else if (newPw !== confPw) {
          errConfirm.textContent = 'Passwords do not match';
          document.getElementById('confirm-password').classList.add('input-error');
          valid = false;
        }
        if (!valid) return;

        btn.disabled    = true;
        btn.textContent = 'Updating…';
        msgBox.style.display = 'none';

        fetch('/api/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token: token, new_password: newPw })
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.error) {
            showMsg(data.error, 'error');
            btn.disabled    = false;
            btn.textContent = 'Reset Password';
          } else {
            showMsg('Your password has been updated successfully!', 'success');
            form.style.display          = 'none';
            loginRedirect.style.display = 'flex';
          }
        })
        .catch(function () {
          showMsg('Something went wrong. Please try again.', 'error');
          btn.disabled    = false;
          btn.textContent = 'Reset Password';
        });
      });
    })();
  </script>
</body>
</html>
