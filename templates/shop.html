<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Veloura — Shop the latest fashion collections." />
  <title>Shop — Veloura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/redesign.css') }}" />
</head>
<body>

  <!-- HEADER -->
  <header class="vl-header" role="banner">
    <div class="vl-header-container">
      <div class="vl-nav-pill">
        <button class="vl-logo-link vl-logo-btn" id="vlLogoBtn" aria-label="Open menu" data-testid="button-logo-sidebar">
          <div class="vl-logo-circle">
            <img src="/static/images/veloura_logo.jpeg" alt="Veloura" class="vl-logo-img" />
          </div>
        </button>
        <a href="/" class="vl-brand-name" data-testid="link-brand-home">VELOURA</a>
        <div class="vl-nav-icons">
          <div class="vl-search-wrap" id="vlSearchWrap">
            <button class="vl-icon-circle" id="vlSearchBtn" aria-label="Search" data-testid="button-search-toggle">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="vl-search-drop" id="vlSearchDrop">
              <input type="text" class="vl-search-input" id="vlSearchInput" placeholder="Search products…" aria-label="Search products" data-testid="input-search" />
              <button class="vl-search-go" id="vlSearchGo" aria-label="Submit search" data-testid="button-search-submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </button>
            </div>
          </div>
          <a href="/cart" class="vl-icon-circle vl-cart-icon" aria-label="View cart" data-testid="button-cart">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="vl-badge cart-count" id="cartCount" data-testid="text-cart-count">0</span>
          </a>
          <div id="auth-action" class="vl-auth-action">
            <a href="/login" class="vl-icon-circle" aria-label="Login" data-testid="button-login-default">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </a>
          </div>
          <button class="vl-hamburger" id="vlHamburger" aria-label="Toggle menu" aria-expanded="false" data-testid="button-hamburger">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </div>
    <div class="vl-mobile-menu" id="vlMobileMenu" aria-hidden="true">
      <a href="/" class="vl-mobile-link" data-testid="link-mobile-home">Home</a>
      <a href="/shop" class="vl-mobile-link" data-testid="link-mobile-shop">Shop</a>
      <a href="/cart" class="vl-mobile-link" data-testid="link-mobile-cart">Cart</a>
      <a href="/login" class="vl-mobile-link" data-testid="link-mobile-login">Login / Register</a>
    </div>
  </header>

  <div class="vl-sidebar-overlay" id="vlSidebarOverlay" data-testid="sidebar-overlay"></div>
  <nav class="vl-sidebar" id="vlSidebar" aria-label="Main navigation" data-testid="sidebar-nav">
    <div class="vl-sidebar-header">
      <div class="vl-sidebar-logo"><img src="/static/images/veloura_logo.jpeg" alt="Veloura" /></div>
      <span class="vl-sidebar-brand">VELOURA</span>
      <button class="vl-sidebar-close" id="vlSidebarClose" aria-label="Close menu" data-testid="button-sidebar-close">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <ul class="vl-sidebar-links">
      <li><a href="/" class="vl-sidebar-link" data-testid="sidebar-link-home"><span class="vl-sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Home</a></li>
      <li><a href="/information" class="vl-sidebar-link" data-testid="sidebar-link-information"><span class="vl-sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>Information Desk</a></li>
      <li><a href="/contact" class="vl-sidebar-link" data-testid="sidebar-link-contact"><span class="vl-sidebar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Contact</a></li>
    </ul>
  </nav>

  <!-- SHOP MAIN -->
  <main class="shop-page" data-testid="shop-page">

    <!-- Hero banner -->
    <div class="shop-hero" data-testid="shop-hero">
      <p class="section-eyebrow" id="shop-eyebrow" data-testid="text-shop-eyebrow">Collection</p>
      <h1 class="shop-hero-title" id="shop-title"
          style="font-family:'Playfair Display',Georgia,serif;"
          data-testid="text-shop-title">Kurtis</h1>
      <p class="shop-hero-sub" id="shop-sub" data-testid="text-shop-subtitle">Discover our curated selection</p>
    </div>

    <!-- Category tabs -->
    <div class="shop-cat-pills" data-testid="shop-category-tabs">
      <button class="shop-pill shop-pill--cat" data-cat="kurtis" data-testid="pill-cat-kurtis">Kurtis</button>
      <button class="shop-pill shop-pill--cat" data-cat="anarkalis" data-testid="pill-cat-anarkalis">Anarkalis</button>
      <button class="shop-pill shop-pill--cat" data-cat="churidhars" data-testid="pill-cat-churidhars">Churidhars</button>
      <button class="shop-pill shop-pill--cat" data-cat="formals" data-testid="pill-cat-formals">Formals</button>
      <button class="shop-pill shop-pill--cat" data-cat="crop-tops" data-testid="pill-cat-crop-tops">Crop Tops</button>
    </div>

    <!-- Result count -->
    <p class="shop-count" id="shop-count" data-testid="text-shop-count"></p>

    <!-- Products grid -->
    <div class="shop-grid" id="shop-grid" data-testid="shop-grid"></div>

    <!-- Empty state -->
    <div class="shop-empty" id="shop-empty" style="display:none;" data-testid="shop-empty">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:rgba(43,43,43,0.25);margin-bottom:16px;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <p>No products available in this category.</p>
      <a href="/shop" class="btn-primary" style="margin-top:16px;" data-testid="link-shop-all">View All Products</a>
    </div>

  </main>

  <!-- TOAST -->
  <div id="toast" class="toast" role="alert" aria-live="polite" data-testid="toast"></div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
